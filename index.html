<!DOCTYPE html>

<script>
let map = null;
let allStores = [];
let filteredStores = [];
let markerMap = new Map();
let infoWindowMap = new Map();
let hoverTimerMap = new Map();
let selectedStoreId = null;

const storeListEl = document.getElementById("storeList");
const resultCountEl = document.getElementById("resultCount");
const countBadgeEl = document.getElementById("countBadge");
const searchInputEl = document.getElementById("searchInput");
const excelUploadEl = document.getElementById("excelUpload");
const storeModalBackdropEl = document.getElementById("storeModalBackdrop");
const storeModalTitleEl = document.getElementById("storeModalTitle");
const storeModalSubtitleEl = document.getElementById("storeModalSubtitle");
const storeDetailInfoEl = document.getElementById("storeDetailInfo");
const photoGridEl = document.getElementById("photoGrid");
const editPhotoGridEl = document.getElementById("editPhotoGrid");
const reviewDisplayEl = document.getElementById("reviewDisplay");
const photoUploadInputEl = document.getElementById("photoUploadInput");
const imageViewerBackdropEl = document.getElementById("imageViewerBackdrop");
const imageViewerImgEl = document.getElementById("imageViewerImg");
const viewTabBtnEl = document.getElementById("viewTabBtn");
const editTabBtnEl = document.getElementById("editTabBtn");
const viewTabPanelEl = document.getElementById("viewTabPanel");
const editTabPanelEl = document.getElementById("editTabPanel");
const editNameEl = document.getElementById("editName");
const editMainDishEl = document.getElementById("editMainDish");
const editAddressEl = document.getElementById("editAddress");
const editPhoneEl = document.getElementById("editPhone");
const editSiteEl = document.getElementById("editSite");
const editSituationEl = document.getElementById("editSituation");
const editReview1El = document.getElementById("editReview1");
const editReview2El = document.getElementById("editReview2");
const editReview3El = document.getElementById("editReview3");
const editReview4El = document.getElementById("editReview4");
const editRating1El = document.getElementById("editRating1");
const editRating2El = document.getElementById("editRating2");
const editRating3El = document.getElementById("editRating3");
const editRating4El = document.getElementById("editRating4");

function initMap() {
  map = new naver.maps.Map("map", {
    center: new naver.maps.LatLng(36.35, 127.8),
    zoom: 7,
    minZoom: 6
  });
}

function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function updateCounts(count) { resultCountEl.textContent = `${count}곳`; countBadgeEl.textContent = `${count}곳`; }
function getStorePhotos(store) { if (!Array.isArray(store.photos)) store.photos = []; return store.photos; }
function getStoreReviews(store) {
  if (!Array.isArray(store.reviews)) store.reviews = [{text:"",rating:""},{text:"",rating:""},{text:"",rating:""},{text:"",rating:""}];
  store.reviews = store.reviews.slice(0,4).map(item => typeof item === "string" ? { text:item, rating:"" } : { text:item && item.text ? String(item.text) : "", rating:item && item.rating ? String(item.rating) : "" });
  while (store.reviews.length < 4) store.reviews.push({text:"",rating:""});
  return store.reviews;
}
function renderStars(v) {
  const rating = parseFloat(v); if (!rating) return "";
  const full = Math.floor(rating), half = rating % 1 >= 0.5 ? 1 : 0, empty = 5-full-half;
  return "★".repeat(full) + (half ? "⯪" : "") + "☆".repeat(empty);
}
function makeTooltipContent(store) {
  const firstPhoto = getStorePhotos(store)[0];
  const situation = escapeHtml(store["추천상황"] || "");
  return `
    <div class="naver-tooltip">
      ${firstPhoto ? `
        <div class="tooltip-image-wrap">
          <img class="tooltip-image" src="${firstPhoto}" alt="대표 사진" />
          ${situation ? `<div class="tooltip-situation-badge">추천상황 : ${situation}</div>` : ""}
        </div>
      ` : ""}
      <div class="tooltip-title">${escapeHtml(store["상호명"])}</div>
      <div class="tooltip-row"><span class="tooltip-label">주요요리:</span> ${escapeHtml(store["주요요리"])}</div>
      <div class="tooltip-row"><span class="tooltip-label">주소:</span> ${escapeHtml(store["주소"])}</div>
      <div class="tooltip-row"><span class="tooltip-label">전화번호:</span> ${escapeHtml(store["전화번호"])}</div>
      <div class="tooltip-row"><span class="tooltip-label">추천현장:</span> ${escapeHtml(store["추천현장"])}</div>
    </div>`;
}
function clearMarkers() {
  markerMap.forEach(marker => marker.setMap(null));
  infoWindowMap.forEach(info => info.close());
  markerMap.clear(); infoWindowMap.clear(); hoverTimerMap.clear();
}
function closeAllInfoWindows() { infoWindowMap.forEach(info => info.close()); }
function renderMarkers(stores) {
  clearMarkers();
  stores.forEach(store => {
    if (!store.lat || !store.lng) return;
    const position = new naver.maps.LatLng(store.lat, store.lng);
    const marker = new naver.maps.Marker({
      position,
      map,
      icon: {

        size: new naver.maps.Size(30, 42),
        scaledSize: new naver.maps.Size(30, 42),

}
function openStoreOnMap(store) {
  if (store.lat && store.lng) {
    const position = new naver.maps.LatLng(store.lat, store.lng);
    map.setCenter(position); map.setZoom(16);
    const marker = markerMap.get(store.id), info = infoWindowMap.get(store.id);
    if (marker && info) { closeAllInfoWindows(); info.open(map, marker); }
  }
}
function renderList(stores) {
  storeListEl.innerHTML = "";
  if (!stores.length) {
    storeListEl.innerHTML = '<div class="store-item"><div class="store-line">표시할 맛집이 없습니다.</div></div>';
    return;
  }
  stores.forEach(store => {
    const photos = getStorePhotos(store);
    const firstPhoto = photos[0] || "";
    const item = document.createElement("div");
    item.className = "store-item";
    item.innerHTML = `
      <div class="store-item-top">
        ${firstPhoto ? `<img class="store-thumb" src="${firstPhoto}" alt="대표사진" />` : `<div class="store-thumb"></div>`}
        <div class="store-item-body">
          <div class="store-name">${escapeHtml(store["상호명"] || "-")}</div>
          <div class="store-line">${escapeHtml(store["주요요리"] || "-")}</div>
          <div class="store-line">${escapeHtml(store["추천현장"] || "-")}</div>
          <div class="store-line">${escapeHtml(store["주소"] || "-")}</div>
          <div class="photo-badge">사진 ${photos.length}/4</div>
          <button class="mini-btn" data-edit-btn="1">수정</button>
        </div>
      </div>`;
    item.addEventListener("click", () => openStoreModal(store.id, "view"));
    item.querySelector('[data-edit-btn="1"]').addEventListener("click", (e) => { e.stopPropagation(); openStoreModal(store.id, "edit"); });
    storeListEl.appendChild(item);
  });
}
function geocodeAddress(address) {
  return new Promise((resolve) => {
    naver.maps.Service.geocode({ query: address }, function(status, response) {
      if (status !== naver.maps.Service.Status.OK) { resolve(null); return; }
      const item = response.v2.addresses && response.v2.addresses[0];
      if (!item) { resolve(null); return; }
      resolve({ lat: parseFloat(item.y), lng: parseFloat(item.x) });
    });
  });
}
async function normalizeRows(rows) {
  const validRows = rows.filter(row => row["상호명"] || row["주소"]);
  let index = 1;
  for (const row of validRows) {
    row.id = row.id || `store_${Date.now()}_${index++}`;
    row.photos = Array.isArray(row.photos) ? row.photos.slice(0,4) : [];
    row.reviews = Array.isArray(row.reviews) ? row.reviews.slice(0,4) : [{text:"",rating:""},{text:"",rating:""},{text:"",rating:""},{text:"",rating:""}];
    const address = row["주소"] ? String(row["주소"]).trim() : "";
    if (!address) continue;
    if (row.lat && row.lng) continue;
    const point = await geocodeAddress(address);
    if (point) { row.lat = point.lat; row.lng = point.lng; }
  }
  return validRows;
}
function fitMapToStores(stores) {
  const validPoints = stores.filter(x => x.lat && x.lng);
  if (!validPoints.length) { map.setCenter(new naver.maps.LatLng(36.35, 127.8)); map.setZoom(7); return; }
  if (validPoints.length === 1) { map.setCenter(new naver.maps.LatLng(validPoints[0].lat, validPoints[0].lng)); map.setZoom(15); return; }
  const bounds = new naver.maps.LatLngBounds();
  validPoints.forEach(x => bounds.extend(new naver.maps.LatLng(x.lat, x.lng)));
  map.fitBounds(bounds, { top:40, right:40, bottom:40, left:40 });
}
function applySearch() {
  const keyword = searchInputEl.value.trim().toLowerCase();
  if (!keyword) filteredStores = [...allStores];
  else filteredStores = allStores.filter(store => [store["상호명"],store["주요요리"],store["주소"],store["전화번호"],store["추천현장"],store["추천상황"]].filter(Boolean).join(" ").toLowerCase().includes(keyword));
  renderList(filteredStores); renderMarkers(filteredStores); updateCounts(filteredStores.length); fitMapToStores(filteredStores);
}
function getStoreById(id) { return allStores.find(store => store.id === id) || null; }
function renderStoreDetailInfo(store) {
  storeDetailInfoEl.innerHTML = `
    <div class="detail-row"><span class="detail-label">상호명</span>${escapeHtml(store["상호명"] || "-")}</div>
    <div class="detail-row"><span class="detail-label">주요요리</span>${escapeHtml(store["주요요리"] || "-")}</div>
    <div class="detail-row"><span class="detail-label">주소</span>${escapeHtml(store["주소"] || "-")}</div>
    <div class="detail-row"><span class="detail-label">전화번호</span>${escapeHtml(store["전화번호"] || "-")}</div>
    <div class="detail-row"><span class="detail-label">추천현장</span>${escapeHtml(store["추천현장"] || "-")}</div>`;
}
function renderReviewDisplay(store) {
  const reviews = getStoreReviews(store).filter(x => String(x.text || "").trim() !== "");
  if (!reviews.length) { reviewDisplayEl.innerHTML = '<div class="review-empty">등록된 임직원 리뷰가 없습니다.</div>'; return; }
  reviewDisplayEl.innerHTML = `<div class="review-list">${reviews.map((review, idx) => `
    <div class="review-item">
      <div class="review-item-title">리뷰 ${idx + 1}</div>
      ${review.rating ? `<div class="review-stars">${renderStars(review.rating)} <span style="font-size:12px;color:#666;">(${escapeHtml(review.rating)})</span></div>` : ""}
      <div>${escapeHtml(review.text)}</div>
    </div>`).join("")}</div>`;
}
function renderPhotoGrid(store) {
  const photos = getStorePhotos(store); photoGridEl.innerHTML = "";
  for (let i=0;i<4;i++) {
    const photo = photos[i], wrapper = document.createElement("div");
    if (photo) {
      wrapper.className = "photo-card";
      wrapper.innerHTML = `<img src="${photo}" alt="사진 ${i + 1}" /><div class="photo-card-bottom"><div class="photo-tag">${i===0?"대표 사진":`사진 ${i+1}`}</div></div>`;
      wrapper.addEventListener("click", () => openImageViewer(photo));
    } else { wrapper.className = "empty-photo"; wrapper.textContent = `${i+1}번 사진 없음`; }
    photoGridEl.appendChild(wrapper);
  }
}
function renderEditPhotoGrid(store) {
  const photos = getStorePhotos(store); editPhotoGridEl.innerHTML = "";
  for (let i=0;i<4;i++) {
    const photo = photos[i], wrapper = document.createElement("div");
    if (photo) {
      wrapper.className = "photo-card";
      wrapper.innerHTML = `<img src="${photo}" alt="사진 ${i + 1}" /><div class="photo-card-bottom"><div class="photo-tag">${i===0?"대표 사진":`사진 ${i+1}`}</div><button class="mini-btn" data-remove="${i}" style="margin-top:0;">삭제</button></div>`;
      wrapper.querySelector("button").addEventListener("click", (e) => { e.stopPropagation(); removePhotoAt(i); });
      wrapper.addEventListener("click", () => openImageViewer(photo));
    } else { wrapper.className = "empty-photo"; wrapper.textContent = `${i+1}번 사진 자리`; }
    editPhotoGridEl.appendChild(wrapper);
  }
}
function fillEditForm(store) {
  editNameEl.value = store["상호명"] || "";
  editMainDishEl.value = store["주요요리"] || "";
  editAddressEl.value = store["주소"] || "";
  editPhoneEl.value = store["전화번호"] || "";
  editSiteEl.value = store["추천현장"] || "";
  editSituationEl.value = store["추천상황"] || "";
  const reviews = getStoreReviews(store);
  editReview1El.value = reviews[0].text || ""; editReview2El.value = reviews[1].text || ""; editReview3El.value = reviews[2].text || ""; editReview4El.value = reviews[3].text || "";
  editRating1El.value = reviews[0].rating || ""; editRating2El.value = reviews[1].rating || ""; editRating3El.value = reviews[2].rating || ""; editRating4El.value = reviews[3].rating || "";
}
function switchStoreTab(tabName) {
  const isView = tabName === "view";
  viewTabBtnEl.classList.toggle("active", isView); editTabBtnEl.classList.toggle("active", !isView);
  viewTabPanelEl.classList.toggle("active", isView); editTabPanelEl.classList.toggle("active", !isView);
}
function openStoreModal(storeId, startTab="view") {
  selectedStoreId = storeId;
  const store = getStoreById(storeId); if (!store) return;
  storeModalTitleEl.textContent = `${store["상호명"] || "장소"}`;
  storeModalSubtitleEl.textContent = store["추천상황"] || "";
  renderStoreDetailInfo(store); renderReviewDisplay(store); renderPhotoGrid(store); fillEditForm(store); renderEditPhotoGrid(store); switchStoreTab(startTab);
  storeModalBackdropEl.classList.add("show");
}
function closeStoreModal() { storeModalBackdropEl.classList.remove("show"); renderList(filteredStores); renderMarkers(filteredStores); }
function resetEditForm() { const store = getStoreById(selectedStoreId); if (!store) return; fillEditForm(store); renderEditPhotoGrid(store); }
async function saveStoreEdits() {
  const store = getStoreById(selectedStoreId); if (!store) return;
  const oldAddress = (store["주소"] || "").trim(), newAddress = editAddressEl.value.trim();
  store["상호명"] = editNameEl.value.trim();
  store["주요요리"] = editMainDishEl.value.trim();
  store["주소"] = newAddress;
  store["전화번호"] = editPhoneEl.value.trim();
  store["추천현장"] = editSiteEl.value.trim();
  store["추천상황"] = editSituationEl.value.trim();
  store.reviews = [
    { text: editReview1El.value.trim(), rating: editRating1El.value },
    { text: editReview2El.value.trim(), rating: editRating2El.value },
    { text: editReview3El.value.trim(), rating: editRating3El.value },
    { text: editReview4El.value.trim(), rating: editRating4El.value }
  ];
  if (newAddress && newAddress !== oldAddress) {
    const point = await geocodeAddress(newAddress);
    if (point) { store.lat = point.lat; store.lng = point.lng; }
  }
  renderStoreDetailInfo(store); renderReviewDisplay(store); renderPhotoGrid(store); renderList(filteredStores); renderMarkers(filteredStores); fitMapToStores(filteredStores);
  alert("수정 내용이 저장되었습니다."); switchStoreTab("view");
}
function triggerPhotoUpload() {
  const store = getStoreById(selectedStoreId); if (!store) return;
  if (getStorePhotos(store).length >= 4) { alert("사진은 최대 4장까지만 등록할 수 있습니다."); return; }
  photoUploadInputEl.click();
}
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(file);
  });
}
photoUploadInputEl.addEventListener("change", async function (e) {
  const store = getStoreById(selectedStoreId); if (!store) return;
  const files = Array.from(e.target.files || []); if (!files.length) return;
  const currentPhotos = getStorePhotos(store), remainCount = 4 - currentPhotos.length;
  if (remainCount <= 0) { alert("사진은 최대 4장까지만 등록할 수 있습니다."); e.target.value = ""; return; }
  const targetFiles = files.slice(0, remainCount);
  try {
    const urls = [];
    for (const file of targetFiles) urls.push(await readFileAsDataURL(file));
    store.photos = currentPhotos.concat(urls).slice(0,4);
    renderEditPhotoGrid(store); renderPhotoGrid(store); renderList(filteredStores); renderMarkers(filteredStores);
  } catch (error) { console.error(error); alert("사진 업로드 중 오류가 발생했습니다."); }
  e.target.value = "";
});
function removePhotoAt(index) {
  const store = getStoreById(selectedStoreId); if (!store) return;
  const photos = getStorePhotos(store); photos.splice(index,1); store.photos = photos;
  renderEditPhotoGrid(store); renderPhotoGrid(store); renderList(filteredStores); renderMarkers(filteredStores);
}
function focusSelectedStoreOnMap() { const store = getStoreById(selectedStoreId); if (!store) return; openStoreOnMap(store); }
function openImageViewer(src) { imageViewerImgEl.src = src; imageViewerBackdropEl.classList.add("show"); }
function closeImageViewer() { imageViewerBackdropEl.classList.remove("show"); imageViewerImgEl.src = ""; }

excelUploadEl.addEventListener("change", async function (e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data, { type: "array" });
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
    const requiredColumns = ["상호명", "주요요리", "주소", "전화번호", "추천현장", "추천상황"];
    const firstRow = rows[0] || {};
    const missing = requiredColumns.filter(col => !(col in firstRow));
    if (rows.length > 0 && missing.length > 0) { alert("엑셀 양식이 맞지 않습니다.\n필수 컬럼: " + requiredColumns.join(", ")); return; }
    allStores = await normalizeRows(rows);
    filteredStores = [...allStores];
    renderList(filteredStores); renderMarkers(filteredStores); updateCounts(filteredStores.length); fitMapToStores(filteredStores);
  } catch (err) { console.error(err); alert("엑셀 업로드 중 오류가 발생했습니다."); }
  e.target.value = "";
});
searchInputEl.addEventListener("input", applySearch);
function downloadTemplate() {
  const templateData = [{ "상호명":"", "주요요리":"", "주소":"", "전화번호":"", "추천현장":"", "추천상황":"" }];
  const ws = XLSX.utils.json_to_sheet(templateData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "맛집목록");
  XLSX.writeFile(wb, "함봐볼래_맛집_양식.xlsx");
}
function buildSerializableStores() {
  return allStores.map(store => ({
    id: store.id,
    상호명: store["상호명"] || "",
    주요요리: store["주요요리"] || "",
    주소: store["주소"] || "",
    전화번호: store["전화번호"] || "",
    추천현장: store["추천현장"] || "",
    추천상황: store["추천상황"] || "",
    lat: store.lat || "",
    lng: store.lng || "",
    photos: Array.isArray(store.photos) ? store.photos.slice(0,4) : [],
    reviews: Array.isArray(store.reviews) ? store.reviews.slice(0,4) : [{text:"",rating:""},{text:"",rating:""},{text:"",rating:""},{text:"",rating:""}]
  }));
}
function saveHTML() {
  const serializedStores = JSON.stringify(buildSerializableStores());
  let html = document.documentElement.outerHTML;
  const embeddedScript = '<script id="initialStoreData" type="application/json">' + serializedStores.replace(/</g, "\\u003c") + '</' + 'script>';
  html = html.replace(/<script id="initialStoreData" type="application\/json">[\s\S]*?<\/script>/, embeddedScript);
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "함봐볼래_네이버지도.html";
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadInitialStoresFromHtml() {
  try {
    const raw = document.getElementById("initialStoreData").textContent.trim();
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { console.error(e); return []; }
}
storeModalBackdropEl.addEventListener("click", function (e) { if (e.target === storeModalBackdropEl) closeStoreModal(); });
imageViewerBackdropEl.addEventListener("click", function (e) { if (e.target === imageViewerBackdropEl) closeImageViewer(); });
document.addEventListener("keydown", function (e) {
  if (e.key === "Escape") {
    if (imageViewerBackdropEl.classList.contains("show")) closeImageViewer();
    else if (storeModalBackdropEl.classList.contains("show")) closeStoreModal();
  }
});
async function initializeFromEmbeddedData() {
  const embedded = loadInitialStoresFromHtml();
  if (!embedded.length) { updateCounts(0); renderList([]); return; }
  allStores = await normalizeRows(embedded);
  filteredStores = [...allStores];
  renderList(filteredStores); renderMarkers(filteredStores); updateCounts(filteredStores.length); fitMapToStores(filteredStores);
}
initMap();
initializeFromEmbeddedData();
